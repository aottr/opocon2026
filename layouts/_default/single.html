<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode | default "en" }}">
<head>
{{ partial "head.html" . }}
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="ritual-ring ritual-ring--1" aria-hidden="true"></div>
  <div class="ritual-ring ritual-ring--2" aria-hidden="true"></div>

  {{ partial "nav.html" . }}

  <main id="main" class="main main--page">
    <article class="card card--page">
      <div class="card__inner prose">
        <h1 class="page-title">{{ .Title }}</h1>
        {{ .Content }}
      </div>
    </article>
  </main>

  {{ partial "footer.html" . }}
</body>
</html>
